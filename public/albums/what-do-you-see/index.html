<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
  What Do You See &ndash; Gergő Sütő&#39;s Personal Website
</title>
        <link rel="stylesheet" href="/style.css">
        <link rel="icon" type="image/x-icon" href="/favicon.png">
    </head>
    <body>
        
<nav class="album-navigation">
    <small>
        <a href="/">Home Page</a> 
        
        · <a href="gergosuto.com/albums/in-orbit/">Previous Album</a> 
        
        
    </small>
</nav>
<div class="album-content">
    <div class="slideshow" id="slideshow">
        <div class="album-textbox">
            <h2>What Do You See</h2>
            <p></p>
        </div>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/1.jpeg"></img>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/2.jpeg"></img>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/3.jpeg"></img>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/4.jpeg"></img>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/5.jpeg"></img>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/6.jpeg"></img>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/7.jpeg"></img>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/8.jpeg"></img>
        
        <img src="gergosuto.com/albums/what-do-you-see/images/9.jpeg"></img>
        
    </div>
</div>
<div class="scroll-button-container">
    <button class="scroll-button" id="scrollLeft">&larr; Scroll Left</button>
    <button class="scroll-button" id="scrollRight">Scroll Right &rarr;</button>
</div>
<script>
    const container = document.getElementById('slideshow');
    const scrollAmount = .5 * screen.width; 

    document.getElementById('scrollLeft').addEventListener('click', () => {
        container.scrollBy({
            left: -scrollAmount,
            behavior: 'smooth'
        });
    });

    document.getElementById('scrollRight').addEventListener('click', () => {
        container.scrollBy({
            left: scrollAmount,
            behavior: 'smooth'
        });
    });
</script>

    </body>
</html>
