<div class="scroll-button-container">
    <button class="scroll-button" id="scrollLeft">&larr; Scroll Left</button>
    <button class="scroll-button" id="scrollRight">Scroll Right &rarr;</button>
</div>
<script>
    const container = document.getElementById('slideshow');
    const scrollAmount = .5 * screen.width; 

    document.getElementById('scrollLeft').addEventListener('click', () => {
        container.scrollBy({
            left: -scrollAmount,
            behavior: 'smooth'
        });
    });

    document.getElementById('scrollRight').addEventListener('click', () => {
        container.scrollBy({
            left: scrollAmount,
            behavior: 'smooth'
        });
    });
</script>
